[profile.default]
src = "src"
out = "out"
libs = ["lib"]
script = "script"
test = "test"
solc_version = "0.8.24"
optimizer = true
optimizer_runs = 200
via_ir = true
fs_permissions = [{ access = "read-write", path = "./deployments" }]

[profile.ci]
verbosity = 3
fuzz = { runs = 1000 }
invariant = { runs = 256, depth = 64 }

[fmt]
line_length = 120
tab_width = 4
bracket_spacing = true
int_types = "long"

[rpc_endpoints]
celo = "${CELO_MAINNET_RPC}"

[etherscan]
# Etherscan API V2 — one key, all 60+ chains. Get a key at https://etherscan.io/myapikey
celo = { key = "${ETHERSCAN_API_KEY}", url = "https://api.etherscan.io/v2/api?chainid=42220", chain = 42220 }
